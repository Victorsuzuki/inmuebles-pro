version: 1
applications:
  - backend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - echo "Backend build phase - No compilation needed for Node.js Express"
      artifacts:
        baseDirectory: .
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    appRoot: web_app/server
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - echo "VITE_API_URL=$VITE_API_URL" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
      customHeaders:
        - pattern: '**/*'
          headers:
            - key: 'Strict-Transport-Security'
              value: 'max-age=31536000; includeSubDomains'
            - key: 'X-Frame-Options'
              value: 'SAMEORIGIN'
            - key: 'X-XSS-Protection'
              value: '1; mode=block'
            - key: 'X-Content-Type-Options'
              value: 'nosniff'
    appRoot: web_app/client
