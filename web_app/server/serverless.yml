service: inmuebles-pro-api

frameworkVersion: '3'
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-north-1
  stage: dev
  memorySize: 512
  timeout: 29
  httpApi:
    cors: true
  environment:
    JWT_SECRET: ${env:JWT_SECRET}
    CLIENT_URL: ${env:CLIENT_URL}
    SPREADSHEET_ID: ${env:SPREADSHEET_ID}
    GOOGLE_CLIENT_EMAIL: ${env:GOOGLE_CLIENT_EMAIL}
    GOOGLE_PRIVATE_KEY: ${env:GOOGLE_PRIVATE_KEY}
    GOOGLE_DRIVE_FOLDER_ID: ${env:GOOGLE_DRIVE_FOLDER_ID}
    FIREBASE_STORAGE_BUCKET: ${env:FIREBASE_STORAGE_BUCKET}
    DOSSIER_BUCKET: inmuebles-pro-media-eu-north-1
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
          Resource: 'arn:aws:s3:::inmuebles-pro-media-eu-north-1/*'

package:
  patterns:
    - '!.git/**'
    - '!.serverless/**'
    - '!node_modules/nodemon/**'
    - '!scripts/**'
    - '!.env'
    - '!.gitignore'
    - '!package-lock.json'
    - '!README.md'

functions:
  api:
    handler: lambda.handler
    events:
      - httpApi: '*'

# New bucket owned by THIS CloudFormation stack — so we have full control.
# DeletionPolicy: Retain prevents files from being deleted if stack is removed.
resources:
  Resources:
    MediaBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Retain
      Properties:
        BucketName: inmuebles-pro-media-eu-north-1
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders:
                - '*'
              AllowedMethods:
                - GET
                - PUT
                - POST
                - HEAD
              AllowedOrigins:
                - '*'
              ExposedHeaders:
                - ETag
              MaxAge: 3000

    MediaBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref MediaBucket
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
            # Public read for photos and dossiers displayed in the client portal
            - Sid: AllowPublicGetObject
              Effect: Allow
              Principal: '*'
              Action: s3:GetObject
              Resource: !Sub '${MediaBucket.Arn}/*'
